<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
    <f:layout name="Default"/>
    <f:section name="content">
        <div class="row">
            <div class="col-7 h1"> Listing for Post </div>
            <div class="col-5 text-end"> 
                <form id="filterForm">
                    <input type="text" name="tx_blog_bloglist[filter][keyword]" placeholder="Search..." />
                    <input type="date" name="tx_blog_bloglist[filter][date]" />
                    <button type="button" id="clearFilter">Clear</button>
                </form>
            </div>
        </div>
        <f:flashMessages />
        <table class="tx_blog table">
            <thead>
                <tr>
                    <th> Image </th>
                    <th> <f:translate key="tx_blog_domain_model_post.title" /> </th>
                    <th> <f:translate key="tx_blog_domain_model_post.description" /> </th>
                    <th> <f:translate key="tx_blog_domain_model_post.date" /> </th>
                    <th> Actions </th>
                </tr>
            </thead>
            <tbody id="postContainer">
                <f:render partial="Post/List" arguments="{posts: posts}"/>
            </tbody>
        </table>
        <div id="paginationContainer">
            <f:render partial="Post/Pagination" arguments="{pagination: pagination, paginator: paginator, filter: filter}" />
        </div>
    </f:section>
</html>
